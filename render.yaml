## CRM XPAY — Render Blueprint

services:

  # ── Backend (Node.js via Nixpacks) ───────────────────────────────────────────
  - type: web
    name: crm-xpay-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && node dist/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: crm-xpay-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: BACKEND_URL
        value: https://crm-xpay-backend.onrender.com
      - key: FRONTEND_URL
        value: https://crm-xpay-frontend.onrender.com
      - key: WHATSAPP_WEBHOOK_VERIFY_TOKEN
        value: xpay-verify-token
      - key: EVOLUTION_API_URL
        value: ""
      - key: EVOLUTION_API_KEY
        value: ""

  # ── Frontend (Static Site) ────────────────────────────────────────────────────
  - type: static
    name: crm-xpay-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://crm-xpay-backend.onrender.com

# ── PostgreSQL ─────────────────────────────────────────────────────────────────
databases:
  - name: crm-xpay-db
    databaseName: crm_xpay
    plan: free
    region: oregon
