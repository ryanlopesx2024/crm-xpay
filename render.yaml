services:
  - type: web
    name: crm-xpay-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && DATABASE_URL=postgresql://x:x@localhost/x npx prisma generate && npm run build
    startCommand: cd backend && npx prisma db push --accept-data-loss && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: crm-xpay-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: BACKEND_URL
        value: https://crm-xpay-backend.onrender.com
      - key: FRONTEND_URL
        value: https://crm-xpay-frontend.onrender.com
      - key: WHATSAPP_WEBHOOK_VERIFY_TOKEN
        value: xpay-verify-token
      - key: EVOLUTION_API_URL
        value: ""
      - key: EVOLUTION_API_KEY
        value: ""

  - type: static
    name: crm-xpay-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://crm-xpay-backend.onrender.com

databases:
  - name: crm-xpay-db
    databaseName: crm_xpay
    plan: free
    region: oregon
