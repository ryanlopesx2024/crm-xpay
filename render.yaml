services:
  - type: web
    name: crm-xpay-backend
    runtime: node
    plan: free
    buildCommand: "cd frontend && npm install && VITE_API_URL='' npm run build && cp -r dist ../backend/public && cd ../backend && npm install && DATABASE_URL=postgresql://x:x@localhost/x npx prisma generate && npm run build"
    startCommand: "cd backend && npx prisma db push --accept-data-loss && node dist/index.js"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: postgresql://crm_xpay_db_user:xaAf6HXpJdFZ33AagiDqQrW8zF78MtC5@dpg-d6t2n0aa214c73canmf0-a/crm_xpay_db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: BACKEND_URL
        value: https://crm-xpay-9.onrender.com
      - key: FRONTEND_URL
        value: https://crm-xpay-9.onrender.com
      - key: WHATSAPP_WEBHOOK_VERIFY_TOKEN
        value: xpay-verify-token
      - key: EVOLUTION_API_URL
        value: ""
      - key: EVOLUTION_API_KEY
        value: ""
